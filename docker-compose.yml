services:
  agent:
    build: .
    environment:
      - APP_ENV
      - MAIN_SERVER_URL
      - AGENT_API_KEY
      - HTTP_PORT=8080
      - LOG_LEVEL
      - LOG_OUTPUT
      - PRINTER_IP
      - DESI_PRINTER_IP
      - PIZZA_PRINTER_IP
      - SUB_PRINTER_IP
      - WINGS_PRINTER_IP
      - PRINTER_DETECT_DELAY
      - PUSHOVER_APP_TOKEN
      - PUSHOVER_USER_KEY
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_HEADERS
      - OTEL_SERVICE_NAME
      - DATABASE_URL=postgres://agent:agent@postgres:5432/agent?sslmode=disable
    # Publish the agent's HTTP port on the host. nginx still proxies /api/
    # (and serves the web UI on :80); this extra publish lets the mobile
    # app — or anything else on the LAN — hit the API directly at :8080
    # without going through nginx. Useful for pytest and for mobile builds
    # that don't want to depend on the nginx container.
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-net

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    volumes:
      - agent-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - agent-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - agent-net

volumes:
  agent-pgdata:

networks:
  agent-net:
    driver: bridge
