<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quicc POS — Orders</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #status {
      font-size: 0.75rem;
      color: #666;
    }

    #refresh-btn {
      background: #2a2a2a;
      color: #e8e8e8;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #refresh-btn:hover { background: #333; }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    #empty {
      text-align: center;
      color: #444;
      margin-top: 80px;
      font-size: 0.95rem;
    }

    .order-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .order-card:hover { border-color: #3a3a3a; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #222;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .order-id {
      font-size: 0.75rem;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .customer-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-delivery  { background: #1a3a5c; color: #5fa8e8; }
    .badge-pickup    { background: #1a3a1f; color: #5ecf6a; }
    .badge-default   { background: #2a2a2a; color: #888; }

    .card-body {
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .items-list {
      list-style: none;
    }

    .items-list li {
      font-size: 0.85rem;
      color: #bbb;
      line-height: 1.6;
      display: flex;
      gap: 6px;
    }

    .item-qty {
      color: #666;
      min-width: 22px;
    }

    .item-mods {
      font-size: 0.78rem;
      color: #555;
      margin-left: 28px;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .order-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .order-notes {
      font-size: 0.8rem;
      color: #f0a050;
      font-style: italic;
      grid-column: 1 / -1;
      margin-top: -4px;
    }

    .card-footer {
      padding: 10px 18px;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .times {
      font-size: 0.75rem;
      color: #555;
    }

    .reprint-btn {
      background: transparent;
      color: #5fa8e8;
      border: 1px solid #1a3a5c;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .reprint-btn:hover { background: #1a3a5c; color: #9ccfff; }

    .reprint-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .reprint-btn.success { border-color: #1a3a1f; color: #5ecf6a; }
    .reprint-btn.error   { border-color: #5c1a1a; color: #e85f5f; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #444;
      border-top-color: #5fa8e8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Quicc POS &mdash; Orders (24h)</h1>
  <div class="header-right">
    <span id="status">Loading&hellip;</span>
    <button id="refresh-btn" onclick="loadOrders()">Refresh</button>
  </div>
</header>

<main>
  <div id="empty" hidden>No orders in the last 24 hours.</div>
  <div id="order-list"></div>
</main>

<script>
  let autoRefreshTimer;

  async function loadOrders() {
    const btn = document.getElementById('refresh-btn');
    const status = document.getElementById('status');
    const list = document.getElementById('order-list');
    const empty = document.getElementById('empty');

    btn.disabled = true;
    status.textContent = 'Loading…';

    try {
      const res = await fetch('/api/orders');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const entries = await res.json();

      list.innerHTML = '';

      if (!entries || entries.length === 0) {
        empty.hidden = false;
        status.textContent = `Updated ${formatTime(new Date())} — 0 orders`;
      } else {
        empty.hidden = true;
        entries.forEach(entry => list.appendChild(buildCard(entry)));
        status.textContent = `Updated ${formatTime(new Date())} — ${entries.length} order${entries.length !== 1 ? 's' : ''}`;
      }
    } catch (err) {
      status.textContent = `Error: ${err.message}`;
    } finally {
      btn.disabled = false;
      clearTimeout(autoRefreshTimer);
      autoRefreshTimer = setTimeout(loadOrders, 60_000);
    }
  }

  function buildCard(entry) {
    const o = entry.order;
    const printedAt = entry.printed_at ? new Date(entry.printed_at) : null;

    const card = document.createElement('div');
    card.className = 'order-card';

    const serviceType = (o.service_type || '').toLowerCase();
    const badgeClass = serviceType === 'delivery' ? 'badge-delivery'
                     : serviceType === 'pickup'   ? 'badge-pickup'
                     : 'badge-default';
    const badgeLabel = o.service_type || 'Online';

    const customerName = [o.customer?.first_name, o.customer?.last_name].filter(Boolean).join(' ') || 'Unknown';

    // Build items HTML
    const itemsHTML = (o.items || []).map(item => {
      const mods = (item.modifiers || [])
        .filter(m => m.name)
        .map(m => `${m.action || ''} ${m.name}`.trim())
        .join(', ');
      return `
        <li>
          <span class="item-qty">${item.quantity}x</span>
          <span>${escHtml(item.name)}${item.size_name ? ` (${escHtml(item.size_name)})` : ''} &mdash; $${item.price.toFixed(2)}</span>
        </li>
        ${mods ? `<li class="item-mods">${escHtml(mods)}</li>` : ''}
      `;
    }).join('');

    const notesHTML = o.notes
      ? `<p class="order-notes">Note: ${escHtml(o.notes)}</p>`
      : '';

    const printedAtStr = printedAt ? `Printed ${formatTime(printedAt)}` : '';
    const submittedStr = o.submitted_date ? `Submitted ${formatDateTime(o.submitted_date)}` : '';
    const timesStr = [submittedStr, printedAtStr].filter(Boolean).join(' &bull; ');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-meta">
          <span class="order-id">#${o.order_id}</span>
          <span class="customer-name">${escHtml(customerName)}</span>
          <span class="badge ${badgeClass}">${escHtml(badgeLabel)}</span>
        </div>
      </div>
      <div class="card-body">
        <ul class="items-list">${itemsHTML || '<li style="color:#555">No items</li>'}</ul>
        ${notesHTML}
        <div class="card-right">
          <span class="order-total">$${(o.order_total || 0).toFixed(2)}</span>
        </div>
      </div>
      <div class="card-footer">
        <span class="times">${timesStr}</span>
        <button class="reprint-btn" onclick="reprint(this, ${o.order_id})">Reprint</button>
      </div>
    `;

    return card;
  }

  async function reprint(btn, orderId) {
    btn.disabled = true;
    btn.className = 'reprint-btn';
    btn.innerHTML = '<span class="spinner"></span>Printing…';

    try {
      const res = await fetch(`/api/orders/${orderId}/reprint`, { method: 'POST' });
      if (!res.ok) {
        const body = await res.text();
        throw new Error(body || `HTTP ${res.status}`);
      }
      btn.innerHTML = 'Printed!';
      btn.className = 'reprint-btn success';
      setTimeout(() => {
        btn.innerHTML = 'Reprint';
        btn.className = 'reprint-btn';
        btn.disabled = false;
      }, 3000);
    } catch (err) {
      btn.innerHTML = 'Failed';
      btn.className = 'reprint-btn error';
      btn.title = err.message;
      setTimeout(() => {
        btn.innerHTML = 'Reprint';
        btn.className = 'reprint-btn';
        btn.disabled = false;
        btn.title = '';
      }, 3000);
    }
  }

  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function formatDateTime(str) {
    try {
      const d = new Date(str);
      return isNaN(d) ? str : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return str; }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadOrders();
</script>

</body>
</html>
