server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE: long-held stream, buffering off so events flush through immediately,
    # and a proxy_read_timeout well above the agent's 25s keepalive so network
    # jitter doesn't kill the connection. Pair this with
    # `X-Accel-Buffering: no` that the agent sets on the response — belt and
    # suspenders.
    location /api/events {
        proxy_pass http://agent:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding off;
    }

    # Regular REST: 60s is enough for worst-case accept (10s print timeout +
    # DB), while still closing runaway clients.
    location /api/ {
        proxy_pass http://agent:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
